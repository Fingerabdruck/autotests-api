# Имя вашего workflow, которое будет отображаться в интерфейсе GitHub Actions
name: API tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # ДЖОБА 1: ЗАПУСК ТЕСТОВ
  # ==========================================
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version: '3.12'

      - name: Run my script
        run: python my_script.py

      - name: Clone test server repository
        run: git clone https://github.com/Nikita-Filonov/qa-automation-engineer-api-course.git

      - name: Install test server dependencies
        run: pip install -r qa-automation-engineer-api-course/requirements.txt

      - name: Start a test server
        env:
          APP_HOST: "http://localhost:8000"
          DATABASE_URL: "sqlite+aiosqlite:///./local.db"
          JWT_ALGORITHM: "HS256"
          JWT_SECRET_KEY: "qa-automation-engineer-api-course-secret-key"
          JWT_ACCESS_TOKEN_EXPIRE: 1800
          JWT_REFRESH_TOKEN_EXPIRE: 5184000
        run: uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir ./qa-automation-engineer-api-course &

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests with pytest and generate Allure results
        run: |
          pytest -m regression --alluredir=allure-results --numprocesses 2

      # НОВЫЙ ШАГ: Сохраняем папку allure-results как артефакт
      - name: Upload Allure results as artifact
        uses: actions/upload-artifact@v4
        if: always()  # Сохраняем артефакт, даже если тесты упали (чтобы увидеть красные тесты в отчете)
        with:
          name: allure-results
          path: allure-results

  # ==========================================
  # ДЖОБА 2: ПУБЛИКАЦИЯ ОТЧЕТА
  # ==========================================
  publish-report:
    runs-on: ubuntu-latest
    needs: run-tests  # Указываем зависимость: эта джоба ждет завершения run-tests
    if: always()      # Запускаем публикацию отчета всегда (даже если тесты нашли баги и run-tests упала)

    steps:
      # НОВЫЙ ШАГ: Скачиваем артефакт из первой джобы
      - name: Download Allure results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generates Allure Report with history
        uses: simple-elf/allure-report-action@v1.12
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history