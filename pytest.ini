# pytest.ini
[pytest]
python_files = *_tests.py test_*.py  # Это мы добавили в предыдущем шаге
python_classes = Test*               # Устанавливает правила для имен классов
python_functions = test_*            # Устанавливает правила для имен функций
addopts = -s -v
markers =
    users: Маркировка для тестов, связанных с пользователями.
    smoke: дымовые тесты (быстрая проверка критичных сценариев)
    regression: тесты на проверку регрессии (чтобы не ломать старую функциональность)
    authentication: тесты, связанные с аутентификацией (вход, токены, восстановление пароля)